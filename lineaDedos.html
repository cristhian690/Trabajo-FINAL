<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>detenccion posicion mano</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
<style>
    body {
      margin: 0;
      background: black;
      color: #c6ff3a;
      text-align: center;
      font-family: Arial;
    }
  </style>
</head>

<body>

<h1>Detección Neón de Índices</h1>

<script>

let handPose;
let video;
let hands = [];

// CARGA DEL MODELO DE MANOS
function preload() {
  // Carga el modelo handPose de ml5
  handPose = ml5.handPose();
}

// CONFIGURACIÓN INICIAL
function setup() {

  // Crea un canvas de dibujo (640x480)
  createCanvas(640, 480);

  // Captura video de la cámara
  video = createCapture(VIDEO);

  // Define tamaño del video
  video.size(640, 480);

  // Oculta el video HTML (solo se dibuja en canvas)
  video.hide();

  // Inicia detección de manos en el video
  handPose.detectStart(video, gotHands);
}


// DIBUJO EN PANTALLA (FRAME A FRAME)

function draw() {

  // Limpia fondo en cada frame
  background(0);
  image(video, 0, 0, width, height);


  // SOLO SI HAY 2 MANOS DETECTADAS
  if (hands.length >= 2) {

    // Obtiene la punta del índice de la mano 1
    let dedo1 = hands[0].index_finger_tip;

    // Obtiene la punta del índice de la mano 2
    let dedo2 = hands[1].index_finger_tip;

    // Calcula la distancia 
    let distancia = dist(
      dedo1.x,
      dedo1.y,
      dedo2.x,
      dedo2.y
    );

    // Rojo cambia según distancia
    let r = map(distancia, 0, 500, 0, 255);

    // Verde inverso a la distancia
    let g = map(distancia, 0, 500, 255, 50);

    // Azul constante/variable suave
    let b = map(distancia, 0, 500, 255, 255);

    // Grosor de la línea según distancia
    let grosor = map(distancia, 0, 500, 2, 20);

    

    // Dibujamos varias líneas transparentes para simular brillo
    for (let i = 8; i > 0; i--) {

      stroke(r, g, b, 20); // color con transparencia (brillo suave)

      strokeWeight(grosor + i * 2); // cada capa más gruesa

      line(
        dedo1.x, // posición X dedo 1
        dedo1.y, // posición Y dedo 1
        dedo2.x, // posición X dedo 2
        dedo2.y  // posición Y dedo 2
      );
    }

  
    // LÍNEA PRINCIPAL (BRILLO FUERTE)

    stroke(r, g, b);        // color principal sólido
    strokeWeight(grosor);   // grosor base

    line(
      dedo1.x,
      dedo1.y,
      dedo2.x,
      dedo2.y
    );
  }
}


// FUNCIÓN QUE RECIBE LAS MANOS
function gotHands(results) {
  hands = results;
}

</script>

</body>
</html>
